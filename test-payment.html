<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Test SePay</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 40px; }
    button { padding: 15px 30px; font-size: 18px; background: #0066ff; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #0052cc; }
    #result { margin-top: 20px; }
  </style>
</head>
<body>
  <h2>Test Thanh Toán SePay</h2>

  <button onclick="createPayment()">1. Tạo form thanh toán</button>

  <div id="result"></div>

  <script>
    async function createPayment() {
      document.getElementById("result").innerHTML = "<h3>Đang tạo form...</h3>";

      try {
        const res = await fetch("https://desirous-rodger-panlogistically.ngrok-free.dev/payment/create", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            amount: 100000,
            invoice_number: "DH20250517_" + Date.now(),
            description: "Test thanh toán " + new Date().toISOString(),
            success_url: "https://yourdomain.com/success",
            error_url:   "https://yourdomain.com/error",
            cancel_url:  "https://yourdomain.com/cancel"
          })
        });

        const html = await res.text();
        document.getElementById("result").innerHTML = html;

      } catch (e) {
        document.getElementById("result").innerHTML = "<strong>Lỗi: " + e.message + "</strong>";
      }
    }
  </script>
</body>
</html>
