<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giao dịch đã huỷ</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber-deep: #92580a;
      --amber-main: #d97706;
      --amber-light: #fde68a;
      --amber-pale: #fffbf0;
      --text-dark: #1c1308;
      --text-mid: #6b4e1a;
      --text-soft: #b8924f;
      --white: #ffffff;
    }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--amber-pale);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -100px;
      width: 380px; height: 380px;
      background: radial-gradient(circle, #fde68a44, transparent 70%);
      border-radius: 50%;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -80px;
      width: 320px; height: 320px;
      background: radial-gradient(circle, #d9770622, transparent 70%);
      border-radius: 50%;
    }

    .card {
      background: var(--white);
      border-radius: 28px;
      padding: 56px 48px 48px;
      max-width: 460px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 60px rgba(217, 119, 6, 0.10), 0 2px 12px rgba(0,0,0,0.04);
      position: relative;
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 96px; height: 96px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 32px;
      animation: popIn 0.5s 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .icon-wrap svg {
      width: 48px; height: 48px;
      stroke: var(--amber-deep);
    }

    /* Dashed ring */
    .icon-wrap::after {
      content: '';
      position: absolute;
      width: 112px; height: 112px;
      border-radius: 50%;
      border: 2px dashed var(--amber-main);
      opacity: 0.5;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .status-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--amber-main);
      margin-bottom: 10px;
      animation: fadeIn 0.5s 0.5s both;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
      animation: fadeIn 0.5s 0.55s both;
    }

    .desc {
      font-size: 15px;
      color: var(--text-mid);
      line-height: 1.65;
      margin-bottom: 36px;
      animation: fadeIn 0.5s 0.6s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .info-box {
      background: var(--amber-pale);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 32px;
      text-align: left;
      border: 1px solid #fde68a;
      animation: fadeIn 0.5s 0.65s both;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #fde68a88;
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: var(--text-soft); }
    .info-row .value { font-weight: 600; color: var(--text-dark); }

    .notice {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-left: 3px solid var(--amber-main);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 32px;
      text-align: left;
      font-size: 13.5px;
      color: var(--text-mid);
      line-height: 1.55;
      animation: fadeIn 0.5s 0.68s both;
    }
    .notice svg { flex-shrink: 0; width: 18px; height: 18px; stroke: var(--amber-main); margin-top: 1px; }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 15px 24px;
      background: var(--amber-main);
      color: var(--white);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      animation: fadeIn 0.5s 0.75s both;
      box-shadow: 0 4px 18px rgba(217, 119, 6, 0.30);
    }
    .btn:hover {
      background: var(--amber-deep);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(217, 119, 6, 0.40);
    }
    .btn:active { transform: translateY(0); }

    .btn-outline {
      display: inline-block;
      margin-top: 12px;
      width: 100%;
      padding: 13px 24px;
      background: transparent;
      border: 1.5px solid #fde68a;
      color: var(--text-mid);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
      animation: fadeIn 0.5s 0.8s both;
    }
    .btn-outline:hover { border-color: var(--amber-main); color: var(--amber-deep); }
  </style>
</head>
